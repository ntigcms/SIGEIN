<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIGEIN</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <link rel="stylesheet" href="/static/css/sigen-alerts.css">
</head>
<body class="sigen-alert-back-page">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="/static/js/sigen-alerts.js?v=20260527"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      if (!window.SIGENAlert) {
        alert({{ message | tojson }});
        history.back();
        return;
      }
      SIGENAlert.showThenBack({{ message | tojson }}, {{ icon | tojson }});
    });
  </script>
</body>
</html>
