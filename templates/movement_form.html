{% extends "base.html" %}
{% block title %}Movimentação{% endblock %}

{% block content %}
<div class="container">
    <h2>Movimentação de Estoque</h2>

    <form method="post" action="{% if movimento %}/movements/edit/{{ movimento.id }}{% else %}/movements{% endif %}">

        <!-- Categoria -->
        <div class="form-group">
            <label for="category">Categoria</label>
            <select id="category" required>
                <option value="">-- Selecione a categoria --</option>
                {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.nome }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Produto -->
        <div class="form-group">
            <label for="product">Produto</label>
            <select id="product" name="type_id" required disabled>
                <option value="">-- Selecione o produto --</option>
            </select>
        </div>

        <!-- Bloco único para itens com série/tombo: filtro + Número de Série e/ou Número do Tombo -->
        <div class="form-group" id="itens-fisicos-wrapper" style="display:none;">
            <label>Buscar (filtrar lista)</label>
            <input type="text" id="item-filtro" class="form-control" placeholder="Digite para filtrar tombos ou séries..." autocomplete="off">
        </div>
        <!-- Número de Série -->
        <div class="form-group" id="serie-container" style="display:none;">
            <label for="serie-select">Número de Série</label>
            <select id="serie-select" size="8">
                <option value="">-- Selecione --</option>
            </select>
        </div>

        <!-- Número do Tombo -->
        <div class="form-group" id="tombo-container" style="display:none;">
            <label for="tombo-select">Número do Tombo</label>
            <select id="tombo-select" size="8">
                <option value="">-- Selecione --</option>
            </select>
        </div>

        <!-- Unidade de Origem -->
        <div class="form-group">
            <label for="unit_origem">Unidade de Origem</label>
            <select id="unit_origem" name="unit_origem_id" required>
                <option value="">-- Selecione --</option>
            </select>
        </div>

        <!-- Unidade de Destino -->
        <div class="form-group">
            <label for="unit_destino">Unidade de Destino</label>
            <select id="unit_destino" name="unit_destino_id" required>
                <option value="">-- Selecione --</option>
                {% for u in units %}
                    <option value="{{ u.id }}">{{ u.nome }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Tipo de Movimentação -->
        <div class="form-group">
            <label for="tipo">Tipo de Movimentação</label>
            <select id="tipo" name="tipo" required>
                <option value="">-- Selecione --</option>
                <option value="ENTRADA">Entrada</option>
                <option value="SAIDA">Saída</option>
                <option value="TRANSFERENCIA">Transferência</option>
                <option value="AJUSTE">Ajuste</option>
            </select>
        </div>

        <!-- Quantidade -->
        <div class="form-group">
            <label for="quantidade">Quantidade</label>
            <input type="number" name="quantidade" id="quantidade" min="1" disabled>
        </div>

        <!-- Observação -->
        <div class="form-group">
            <label for="observacao">Observação</label>
            <textarea name="observacao"></textarea>
        </div>

        <!-- Campo oculto para item_id -->
        <input type="hidden" name="item_id" id="item_id">

        <div class="buttons">
    <button type="submit" class="btn-submit">
        {% if movimento %}Atualizar{% else %}Salvar{% endif %}
    </button>

    {% if movimento %}
        <a href="/movements" class="btn-cancel">Voltar</a>
    {% else %}
        <a href="/movements" class="btn-cancel">Cancelar</a>
    {% endif %}
</div>

    </form>
</div>

<style>
    #itens-fisicos-wrapper input.form-control { margin-bottom: 10px; }
    #serie-select, #tombo-select { width: 100%; max-height: 200px; }
    .btn-cancel {
    padding: 11px 24px;
    border-radius: 8px;
    border: 1px solid #cbd5e1;
    color: #334155;
    text-decoration: none;
}

    .btn-cancel:hover {
    background: #f1f5f9;
}
</style>

<script>
const productsData = JSON.parse('{{ products | tojson | safe }}');

const categorySelect = document.getElementById("category");
const productSelect = document.getElementById("product");

const serieContainer = document.getElementById("serie-container");
const serieSelect = document.getElementById("serie-select");

const tomboContainer = document.getElementById("tombo-container");
const tomboSelect = document.getElementById("tombo-select");

const unitOrigemSelect = document.getElementById("unit_origem");
const quantidadeInput = document.getElementById("quantidade");
const itemIdInput = document.getElementById("item_id");

/* ---------------- FUNÇÃO PARA ATUALIZAR UNIDADE ---------------- */
function atualizarUnidadeOrigem(unit_id, unit_name, item_id=null) {
    unitOrigemSelect.innerHTML = '';
    if (!unit_id || !unit_name) return; // evita undefined
    const opt = document.createElement("option");
    opt.value = unit_id;
    opt.text = unit_name;
    unitOrigemSelect.appendChild(opt);
    unitOrigemSelect.value = unit_id;
    itemIdInput.value = item_id || '';
}

/* ---------------- CATEGORIA → PRODUTO ---------------- */
categorySelect.addEventListener('change', () => {
    const cat = parseInt(categorySelect.value);

    productSelect.innerHTML = '<option value="">-- Selecione o produto --</option>';
    productSelect.disabled = !cat;

    resetItems();
    resetUnidade();
    quantidadeInput.value = '';
    quantidadeInput.disabled = true;

    if (!cat) return;

    const filtered = productsData.filter(p => p.category_id === cat);
    const grouped = {};
    filtered.forEach(p => {
        if (!grouped[p.type_id]) {
            grouped[p.type_id] = {
                type_id: p.type_id,
                type_name: p.type_name,
                controla_por_serie: p.controla_por_serie
            };
        }
    });

    Object.values(grouped).forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.type_id;
        opt.text = p.type_name;
        opt.dataset.controlaPorSerie = p.controla_por_serie;
        productSelect.appendChild(opt);
    });
});

/* ---------------- PRODUTO ---------------- */
/* ---------------- PRODUTO ---------------- */
productSelect.addEventListener("change", async () => {
    resetItems();
    resetUnidade();
    quantidadeInput.value = '';
    quantidadeInput.disabled = true;
    itemIdInput.value = '';

    const opt = productSelect.selectedOptions[0];
    if (!opt || !opt.value) return;

    const controlaSerie = opt.dataset.controlaPorSerie === "true";

    if (controlaSerie) {
        // ✅ Produto com série/tombo: unidade preenchida após escolher o item
        quantidadeInput.disabled = true;
        await carregarItensFisicos(opt.value);

    } else {
        // ✅ Produto sem série: popula lista com TODAS as unidades que têm estoque
        quantidadeInput.disabled = false;

        // Busca o produto pelo type_id (pode haver múltiplos com mesmo type_id e unidades diferentes)
        const produtosDaCategoria = productsData.filter(p => p.type_id == opt.value);

        // Coleta todas as units_options únicas entre os produtos do mesmo tipo
        const unitsMap = {};
        produtosDaCategoria.forEach(p => {
            if (p.units_options) {
                p.units_options.forEach(u => {
                    if (!unitsMap[u.unit_id]) {
                        unitsMap[u.unit_id] = u.unit_name;
                    }
                });
            }
        });

        const unidades = Object.entries(unitsMap);

        if (unidades.length > 0) {
            unidades.forEach(([unit_id, unit_name]) => {
                const optUnit = document.createElement("option");
                optUnit.value = unit_id;
                optUnit.text = unit_name;
                unitOrigemSelect.appendChild(optUnit);
            });
        }
        // Se só tiver uma unidade, já fica selecionada automaticamente pelo browser
    }
});

/* ---------------- TOMBO / SÉRIE ---------------- */
const itensFisicosWrapper = document.getElementById("itens-fisicos-wrapper");
const itemFiltroInput = document.getElementById("item-filtro");

async function carregarItensFisicos(type_id) {
    serieSelect.innerHTML = '<option value="">-- Selecione --</option>';
    tomboSelect.innerHTML = '<option value="">-- Selecione --</option>';
    if (itemFiltroInput) itemFiltroInput.value = '';

    itensFisicosWrapper.style.display = 'none';
    serieContainer.style.display = 'none';
    tomboContainer.style.display = 'none';
    itemIdInput.value = '';

    const res = await fetch(`/movements/items/${type_id}`);
    const itens = await res.json();
    if (!itens.length) return;

    const itensNormalizados = itens.map(i => ({
        ...i,
        isTombo: i.tombo === true || i.tombo === "true" || i.tombo === 1 || i.tombo === "1"
    }));

    const temSerie = itensNormalizados.some(i => !i.isTombo);
    const temTombo = itensNormalizados.some(i => i.isTombo);

    if (temSerie) {
        serieContainer.style.display = "block";
        itensNormalizados.filter(i => !i.isTombo).forEach(i => {
            const opt = document.createElement("option");
            opt.value = i.id;
            opt.text = i.num;
            opt.dataset.unitId = i.unit_id;
            opt.dataset.unitName = i.unit_name;
            serieSelect.appendChild(opt);
        });
    }
    if (temTombo) {
        tomboContainer.style.display = "block";
        itensNormalizados.filter(i => i.isTombo).forEach(i => {
            const opt = document.createElement("option");
            opt.value = i.id;
            opt.text = i.num;
            opt.dataset.unitId = i.unit_id;
            opt.dataset.unitName = i.unit_name;
            tomboSelect.appendChild(opt);
        });
    }
    if (temSerie || temTombo) {
        itensFisicosWrapper.style.display = "block";
        aplicarFiltroItem();
    }
}

function aplicarFiltroItem() {
    const filtro = (itemFiltroInput && itemFiltroInput.value) ? itemFiltroInput.value.trim().toLowerCase() : '';
    [serieSelect, tomboSelect].forEach(select => {
        for (let i = 0; i < select.options.length; i++) {
            const opt = select.options[i];
            if (!opt.value) continue;
            const show = !filtro || (opt.text && opt.text.toLowerCase().indexOf(filtro) !== -1);
            opt.style.display = show ? '' : 'none';
        }
    });
}
if (itemFiltroInput) {
    itemFiltroInput.addEventListener('input', aplicarFiltroItem);
}

/* ---------------- ITEM → UNIDADE AUTOMÁTICA ---------------- */
serieSelect.addEventListener("change", () => {
    tomboSelect.value = "";
    const opt = serieSelect.selectedOptions[0];
    if (!opt) return;
    atualizarUnidadeOrigem(opt.dataset.unitId, opt.dataset.unitName, opt.value);
});

tomboSelect.addEventListener("change", () => {
    serieSelect.value = "";
    const opt = tomboSelect.selectedOptions[0];
    if (!opt) return;
    atualizarUnidadeOrigem(opt.dataset.unitId, opt.dataset.unitName, opt.value);
});

/* ---------------- HELPERS ---------------- */
function resetItems() {
    itensFisicosWrapper.style.display = 'none';
    if (itemFiltroInput) itemFiltroInput.value = '';
    serieContainer.style.display = 'none';
    tomboContainer.style.display = 'none';
    serieSelect.innerHTML = '<option value="">-- Selecione --</option>';
    tomboSelect.innerHTML = '<option value="">-- Selecione --</option>';
    itemIdInput.value = '';
}

function resetUnidade() {
    unitOrigemSelect.innerHTML = '<option value="">-- Selecione --</option>';
}


</script>

<script>
// ✅ Forma correta — sem JSON.parse com aspas simples
const movimentoData = {{ movimento | tojson | safe }};

async function carregarModoEdicao() {
    let m;
    try {
        m = JSON.parse('{{ movimento | tojson | safe }}');
    } catch(e) {
        console.error("❌ Erro ao parsear movimento:", e);
        return;
    }

    // 🔍 DEBUG — remover depois
    console.log("MOVIMENTO recebido:", JSON.stringify(m, null, 2));
    console.log("products recebidos:", productsData);

    if (!m || !m.id) {
        console.log("⚠️ movimento vazio ou sem ID, saindo...");
        return;
    }

    // 1️⃣ Seleciona categoria
    categorySelect.value = m.product.category_id;
    categorySelect.dispatchEvent(new Event('change'));
    await new Promise(r => setTimeout(r, 50));

    // 2️⃣ Seleciona produto
    productSelect.value = m.product.type_id;
    productSelect.dispatchEvent(new Event('change'));
    await new Promise(r => setTimeout(r, 300));

    if (m.item) {
        // Produto com série/tombo
        if (m.item.tombo) {
            tomboSelect.value = m.item.id;
            tomboSelect.dispatchEvent(new Event('change'));
        } else {
            serieSelect.value = m.item.id;
            serieSelect.dispatchEvent(new Event('change'));
        }
    } else {
        // ✅ Produto sem série: seleciona a unidade de origem salva
        quantidadeInput.value = m.quantidade;
        quantidadeInput.disabled = false;

        if (m.unit_origem_id) {
            unitOrigemSelect.value = m.unit_origem_id;

            // Se o select ainda não tem a opção (estoque zerado), adiciona manualmente
            if (!unitOrigemSelect.value || unitOrigemSelect.value != m.unit_origem_id) {
                const opt = document.createElement("option");
                opt.value = m.unit_origem_id;
                opt.text = "Unidade atual";
                unitOrigemSelect.appendChild(opt);
                unitOrigemSelect.value = m.unit_origem_id;
            }
        }
    }

    // 3️⃣ Destino, tipo e observação
    document.getElementById("unit_destino").value = m.unit_destino_id;
    document.getElementById("tipo").value = m.tipo;
    document.querySelector("textarea[name='observacao']").value = m.observacao || '';
}

carregarModoEdicao();
</script>

{% endblock %}
